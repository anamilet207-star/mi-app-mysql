version: '3.8'

services:
  # Servicio de base de datos MySQL
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: holamundo
    ports:
      - "3306:3306"
    volumes:
      - ./src/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Servicio de aplicación web
  web:
    build: ./src
    container_name: web_app
    restart: always
    ports:
      - "8080:5000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: holamundo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

# Volumen persistente para MySQL
volumes:
  mysql_data:

# Red interna para comunicación entre servicios
networks:
  app-network:
    driver: bridge